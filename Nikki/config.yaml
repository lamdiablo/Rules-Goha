# ============================================================
# 分流规则（rules）
#
# 重要原则（顺序从上到下匹配，先匹配先生效）：
#   1. 本地/私有地址 → DIRECT
#   2. 私有 IPv6      → DIRECT（保障内网 IPv6 通信）
#   3. 国内运营商 IPv6 → DIRECT（国内双栈直连）
#   4. 海外 IPv6（2000::/3）→ REJECT（禁止直连海外 IPv6）
#      ↑ 以上 4 条须在一般域名/IP 规则之前
#   5. 域名分流（AI / 国内 / 国外）
#   6. GeoSite / GeoIP 规则
#   7. 兜底 → FallBack
# ============================================================
rules:

  # ====== 第一组：本地 / 私有 IPv4 → 直连 ======
  - DOMAIN-SUFFIX,local,DIRECT
  - IP-CIDR,127.0.0.0/8,DIRECT,no-resolve
  - IP-CIDR,10.0.0.0/8,DIRECT,no-resolve
  - IP-CIDR,172.16.0.0/12,DIRECT,no-resolve
  - IP-CIDR,192.168.0.0/16,DIRECT,no-resolve
  - IP-CIDR,169.254.0.0/16,DIRECT,no-resolve
  - IP-CIDR,224.0.0.0/4,DIRECT,no-resolve

  # ====== 第二组：私有 IPv6 → 直连（保障内网 IPv6 正常工作）======
  # 环回地址
  - IP-CIDR6,::1/128,DIRECT,no-resolve
  # 唯一本地地址（fc00::/7 = fc00::/8 + fd00::/8）
  - IP-CIDR6,fc00::/7,DIRECT,no-resolve
  # 链路本地地址
  - IP-CIDR6,fe80::/10,DIRECT,no-resolve
  # NAT64（IPv4 映射）
  - IP-CIDR6,64:ff9b::/96,DIRECT,no-resolve
  - IP-CIDR6,64:ff9b:1::/48,DIRECT,no-resolve
  # 文档/测试用地址
  - IP-CIDR6,2001:db8::/32,DIRECT,no-resolve

  # ====== 第三组：国内运营商 IPv6 → 直连（国内双栈）======
  # 中国电信
  - IP-CIDR6,240e::/18,DIRECT,no-resolve
  # 中国移动
  - IP-CIDR6,2408::/18,DIRECT,no-resolve
  # 中国联通
  - IP-CIDR6,2409::/18,DIRECT,no-resolve
  # 中国广电（CRTC）
  - IP-CIDR6,2400:da00::/32,DIRECT,no-resolve
  # 教育网 CERNET
  - IP-CIDR6,2001:da8::/32,DIRECT,no-resolve

  # ====== 第四组：海外 IPv6 → 拒绝（禁止直连海外 IPv6）======
  # 2000::/3 覆盖所有全球单播 IPv6（除上方已放行的国内段外均为海外）
  # no-resolve：仅对目标是 IPv6 地址的直连流量生效，不影响域名代理
  - IP-CIDR6,2000::/3,REJECT,no-resolve

  # ====== 第五组：域名分流 ======

  # AI 服务 → AI 代理组
  - RULE-SET,ai_domain,AI

  # （按需启用）其他域名规则集
  # - RULE-SET,reject_domain,REJECT
  # - RULE-SET,cn_domain,DOMESTIC
  # - RULE-SET,global_domain,Global

  # ====== 第六组：GeoSite / GeoIP ======
  - GEOSITE,private,DIRECT
  - GEOSITE,cn,DOMESTIC
  - GEOIP,CN,DOMESTIC,no-resolve

  # ====== 第七组：兜底 ======
  - MATCH,FallBack
