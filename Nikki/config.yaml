# ============================================================
# Nikki (Mihomo) 主配置模板
# 适用版本：Mihomo ≥ 1.18 / OpenWrt Nikki 插件
#
# 策略：国内 IPv4+IPv6 双栈直连，国外仅 IPv4 出口
#   · 国内（CN / private / 本地域名）：允许 IPv4+IPv6 双栈直连
#   · 国外（Global / GlobalMedia / AI 等代理组）：
#       ① IP-CIDR6,2000::/3,REJECT,no-resolve —— 兜底拒绝海外 IPv6 直连
#       ② 流量经代理隧道出站，隧道本身走 IPv4（节点配置为 IPv4 地址/域名）
#
# ⚠ 使用前请阅读仓库 Nikki/README.md，了解前置条件与常见坑
# ============================================================

# ────────────────────────────────────
# 全局设置
# ────────────────────────────────────
mixed-port: 7890        # HTTP(S) + SOCKS5 混合监听端口
allow-lan: true         # 允许局域网设备使用
bind-address: "*"
mode: rule              # 规则模式
log-level: info
ipv6: true              # 允许 Nikki 处理 IPv6 流量（LAN 双栈必须开启）

unified-delay: false
tcp-concurrent: true
find-process-mode: strict

# ────────────────────────────────────
# GeoData 自动更新
# ────────────────────────────────────
geodata-mode: true
geo-auto-update: true
geo-update-interval: 168   # 每 7 天更新一次
geox-url:
  geoip: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip.dat"
  geosite: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geosite.dat"
  mmdb: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/country.mmdb"

# ────────────────────────────────────
# 透明代理入站（OpenWrt TProxy 模式）
# 与 iptables/nftables 规则配合使用
# ────────────────────────────────────
tproxy-port: 7893       # TProxy 透明代理端口
redir-port: 7892        # TCP 重定向端口（可选，某些旧内核需要）

# ────────────────────────────────────
# DNS 配置
# 核心：fake-ip 模式 + ipv6: true
#   · 国内域名 → 国内 DoH → 返回真实 IPv4+IPv6（双栈）
#   · 国外域名 → fake-ip 返回假 IPv4 → 客户端不感知 IPv6
#     Mihomo 侧经代理隧道出站，不产生海外 IPv6 连接
#   · 漏网海外 IPv6 → IP-CIDR6,2000::/3,REJECT 兜底拦截
# ────────────────────────────────────
dns:
  enable: true
  listen: 0.0.0.0:53
  ipv6: true            # 允许对国内域名返回 AAAA 记录（双栈关键）

  use-hosts: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.0/15

  # fake-ip-filter：以下域名直接返回真实 IP，不走 fake-ip
  # NTP / 连通性检测 / 游戏平台 NAT 穿透等需要真实 IP
  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - "localhost"
    - "*.msftconnecttest.com"
    - "*.msftncsi.com"
    - "time.*.com"
    - "time.*.gov"
    - "time.*.edu.cn"
    - "*.ntp.org.cn"
    - "ntp.*.com"
    - "*.time.edu.cn"
    - "+.srv.nintendo.net"
    - "+.stun.playstation.net"
    - "xbox.*.microsoft.com"
    - "+.xboxlive.com"
    - "stun.*.*"
    - "stun.*.*.*"

  # 基础 DNS：仅用于解析 nameserver 中的域名地址
  default-nameserver:
    - 223.5.5.5          # 阿里 DNS（IPv4）
    - 119.29.29.29       # 腾讯 DNS（IPv4）
    - "[2400:3200::1]"   # 阿里 DNS（IPv6，路由器自身连通 IPv6 时可用）

  # 主 DNS：国内 DoH，国外域名经代理 DoH
  nameserver:
    - https://dns.alidns.com/dns-query    # 阿里云 DoH
    - https://doh.pub/dns-query           # 腾讯 DoH

  # 代理节点域名解析 DNS（防止节点域名污染，用国内 DNS 解析后取 IPv4）
  proxy-server-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query

  # 分域 DNS 策略（nameserver-policy）
  # 优先级高于 nameserver，按顺序匹配第一个命中的规则
  nameserver-policy:
    # 国内域名 + 私有域名：国内 DoH，允许返回 IPv4+IPv6（双栈）
    "geosite:private,cn":
      - https://dns.alidns.com/dns-query
      - https://doh.pub/dns-query

    # 国外域名：经代理走 Cloudflare/Google DoH，防 DNS 泄漏
    # fake-ip 模式下客户端只拿到假 IPv4，不会拿到真实 AAAA
    # Mihomo 经代理隧道（IPv4）出站，不产生海外 IPv6 连接
    "geosite:geolocation-!cn":
      - "https://dns.cloudflare.com/dns-query#proxy"
      - "https://dns.google/dns-query#proxy"

# ────────────────────────────────────
# 节点（proxies）
# 请替换为你的实际节点，或使用 proxy-providers 加载订阅
# ────────────────────────────────────
proxies: []

# ────────────────────────────────────
# 代理组（proxy-groups）
# ────────────────────────────────────
proxy-groups:

  # 节点选择：手动选择出口节点
  - name: "节点选择"
    type: select
    proxies:
      - "自动选择"
      # 在此处添加你的节点名称，例如：
      # - "香港 HK01"
      # - "日本 JP01"
      # - "美国 US01"
    include-all: true     # 自动包含 proxies / proxy-providers 中的所有节点

  # 自动选择：延迟测试选最优节点
  - name: "自动选择"
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    include-all: true

  # 🌍 Global：普通境外流量
  - name: "Global"
    type: select
    proxies:
      - "节点选择"
      - "自动选择"
      - DIRECT

  # 🎬 GlobalMedia：流媒体（Netflix、Disney+、YouTube 等）
  - name: "GlobalMedia"
    type: select
    proxies:
      - "节点选择"
      - "自动选择"
      - DIRECT

  # 🤖 AI：AI 服务（OpenAI、Claude、Gemini 等）
  - name: "AI"
    type: select
    proxies:
      - "节点选择"
      - "自动选择"
      - DIRECT

  # 🇨🇳 国内：国内流量直连（IPv4+IPv6 双栈）
  - name: "国内"
    type: select
    proxies:
      - DIRECT
      - "节点选择"

  # 🛑 拦截：广告 / 隐私追踪
  - name: "拦截"
    type: select
    proxies:
      - REJECT
      - DIRECT

  # 🐟 漏网之鱼：未匹配流量走代理
  - name: "漏网之鱼"
    type: select
    proxies:
      - "节点选择"
      - "自动选择"
      - DIRECT

# ────────────────────────────────────
# 规则集（rule-providers）
# ────────────────────────────────────
rule-providers:

  # AI 服务域名规则（来自本仓库 Nikki/Ai.yaml）
  ai_domain:
    type: http
    behavior: domain
    format: yaml
    url: "https://raw.githubusercontent.com/lamdiablo/Rules-Goha/main/Nikki/Ai.yaml"
    path: ./ruleset/ai_domain.yaml
    interval: 86400

# ────────────────────────────────────
# 分流规则（rules）
#
# 顺序重要：从上到下，命中第一条规则即止
# IPv6 规则必须在域名/GeoSite 规则之前，以保证 IP 直连路径正确
# ────────────────────────────────────
rules:

  # ══════════════════════════════════
  # 第一段：私有 / 本地地址，直连
  # 国内 IPv4 + IPv6 双栈均放行
  # ══════════════════════════════════

  # 本地 IPv6 回环
  - IP-CIDR6,::1/128,DIRECT

  # 链路本地 IPv6（fe80::/10）
  - IP-CIDR6,fe80::/10,DIRECT,no-resolve

  # 私有 IPv6 ULA（fc00::/7，含 fd00::/8）
  - IP-CIDR6,fc00::/7,DIRECT,no-resolve

  # 私有 IPv4
  - IP-CIDR,127.0.0.0/8,DIRECT
  - IP-CIDR,10.0.0.0/8,DIRECT
  - IP-CIDR,172.16.0.0/12,DIRECT
  - IP-CIDR,192.168.0.0/16,DIRECT
  - IP-CIDR,169.254.0.0/16,DIRECT
  - IP-CIDR,224.0.0.0/4,DIRECT    # 组播
  - IP-CIDR,240.0.0.0/4,DIRECT    # 保留

  # ══════════════════════════════════
  # 第二段：国内运营商 IPv6 段，直连
  # ⚠ 必须放在 IP-CIDR6,2000::/3,REJECT 之前！
  #   否则国内 IPv6 会被误拦截
  # ══════════════════════════════════
  - IP-CIDR6,240e::/18,DIRECT,no-resolve    # 中国电信 IPv6
  - IP-CIDR6,2408::/18,DIRECT,no-resolve    # 中国联通 IPv6
  - IP-CIDR6,2409::/18,DIRECT,no-resolve    # 中国移动 IPv6

  # ══════════════════════════════════
  # 第三段：海外 IPv6 一律 REJECT
  # 实现"国外仅 IPv4 出口"的核心规则
  #
  # 2000::/3 覆盖所有全球单播 IPv6（2000:: ~ 3fff::）
  # 国内运营商 IPv6 已在上方放行，此处不会误伤
  # no-resolve：不对域名做 DNS 解析，仅匹配已知 IP
  # ══════════════════════════════════
  - IP-CIDR6,2000::/3,REJECT,no-resolve

  # ══════════════════════════════════
  # 第四段：域名分流规则
  # ══════════════════════════════════

  # AI 服务 → AI 代理组
  - RULE-SET,ai_domain,AI

  # 国内私有域名直连（.lan / .local 等）
  - GEOSITE,private,DIRECT

  # 国内域名直连
  - GEOSITE,cn,国内

  # ══════════════════════════════════
  # 第五段：IP 地理位置规则
  # ══════════════════════════════════

  # 国内私有 IP 直连（含 RFC1918）
  - GEOIP,private,DIRECT,no-resolve

  # 国内 IP 直连（GeoIP CN 含国内 IPv4 及已分配的国内 IPv6）
  - GEOIP,CN,国内,no-resolve

  # ══════════════════════════════════
  # 最终规则：未匹配流量走漏网之鱼（境外代理）
  # 代理隧道经 IPv4 出站，不产生海外 IPv6 连接
  # ══════════════════════════════════
  - MATCH,漏网之鱼
